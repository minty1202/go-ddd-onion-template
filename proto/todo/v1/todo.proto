syntax = "proto3";

package todo.v1;

import "buf/validate/validate.proto";

message Todo {
  string id = 1;
  string title = 2;
  string body = 3;
  bool completed = 4;
  string etag = 5;
}

message DefineRequest {
  string title = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 10
  }];
  string body = 2 [(buf.validate.field).string.min_len = 1];
}

message DefineResponse {
  Todo todo = 1;
}

message ViewRequest {
  string id = 1 [(buf.validate.field).string.pattern = "^[0-9A-HJKMNP-TV-Z]{26}$"];
}

message ViewResponse {
  Todo todo = 1;
}

service TodoService {
  rpc Define(DefineRequest) returns (DefineResponse);
  rpc View(ViewRequest) returns (ViewResponse);
}
