root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  include_ext = ["go"]
  exclude_dir = ["tmp", "gen", "mocks", "node_modules", "sql"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  kill_delay = "5s"

[log]
  time = true

[misc]
  clean_on_exit = true
